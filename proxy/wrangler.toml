name = "splitway-assistant"
main = "worker.js"
compatibility_date = "2026-05-01"

# Pin to the correct Cloudflare account so wrangler doesn't pick up a
# stale account ID from local state on machine switches. This is the
# account that owns the splitway-assistant worker.
account_id = "398383e3f012ad82311deaab66e53882"

# Secrets are NOT stored in this file. Set them with:
#   wrangler secret put DEEPSEEK_API_KEY
#   wrangler secret put APP_SHARED_SECRET
#
# Per-IP daily rate limit storage. This is the primary defense against a
# leaked shared secret running up the provider bill — keep it bound.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "97bbbbf561474f14b8c655157c305a03"

# Per-IP daily caps. Chat default 200, vision (receipt scans) default 30.
# Uncomment to override.
# [vars]
# DAILY_LIMIT = "200"
# VISION_DAILY_LIMIT = "30"

# Optional custom domain. After adding api.splitway.app in the Cloudflare
# dashboard, the worker is reachable at https://api.splitway.app/v1/chat/completions
# [[routes]]
# pattern = "api.splitway.app/v1/*"
# zone_name = "splitway.app"
