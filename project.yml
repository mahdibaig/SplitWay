name: Splitway
options:
  bundleIdPrefix: com.mahdibaig
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Splitway:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Splitway/Config/Secrets.xcconfig
      Release: Splitway/Config/Secrets.xcconfig
    sources:
      - path: Splitway
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Splitway/Resources/Assets.xcassets
      - path: Splitway/Resources/onboarding.mp4
      - path: Splitway/Resources/PrivacyInfo.xcprivacy
      - path: Splitway/Models/CoreData/Splitway.xcdatamodeld
    info:
      path: Splitway/Info.plist
      properties:
        CFBundleDisplayName: Splitway
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.finance
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
        ITSAppUsesNonExemptEncryption: false
        # Required for the app to accept CloudKit share invitations (the
        # household invite link). Without it, tapping a share link shows
        # "you need a newer version of the app".
        CKSharingSupported: true
        NSCameraUsageDescription: "Splitway uses the camera to scan receipts. Photos are processed on-device or via your assistant proxy and never stored on our servers."
        # Splitway assistant proxy (see proxy/README.md). The DeepSeek API key
        # never ships in the binary; instead the app POSTs to this Cloudflare
        # Worker, which injects the key server-side. Both values must match
        # what's deployed at `wrangler secret put APP_SHARED_SECRET`. Leave
        # blank in a build that should have AI features disabled.
        # Substituted at build time from Splitway/Config/Secrets.xcconfig
        # (gitignored). See Splitway/Config/Secrets.xcconfig.example.
        SplitwayAssistantBaseURL: "$(SPLITWAY_ASSISTANT_BASE_URL)"
        SplitwayAssistantSharedSecret: "$(SPLITWAY_ASSISTANT_SHARED_SECRET)"
    entitlements:
      path: Splitway/Splitway.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.mahdibaig.splitway
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.mahdibaig.splitway
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mahdibaig.splitway
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        # DEVELOPMENT_TEAM is supplied by Splitway/Config/Secrets.xcconfig
        # (gitignored) so the team ID stays out of the public repo. Add it
        # there before archiving — see TESTFLIGHT.md.
      configs:
        # CloudKit sync (NSPersistentCloudKitContainer) relies on silent
        # push, so aps-environment must match the build's provisioning:
        # development for dev builds, production for the TestFlight/App
        # Store archive. Driven here so Debug-to-device keeps working.
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production

# Wire the local StoreKit config into the Run scheme so Product.products(...)
# returns the in-app purchases during development on simulator AND device.
# Without this, no products load, the paywall is empty, and the onboarding
# "Start my free week" button stays disabled. On TestFlight/App Store this
# config is ignored and real App Store Connect products are used instead.
schemes:
  Splitway:
    build:
      targets:
        Splitway: all
    run:
      config: Debug
      storeKitConfiguration: Splitway/Splitway.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
