<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capybara Mascot Concepts</title>
<style>
body { margin: 0; padding: 40px 20px; background: #e8dcc8; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { background: #faf6f0; padding: 24px; border-radius: 16px; max-width: 720px; width: 100%; }
.title { text-align: center; color: #2a1d14; font-size: 18px; font-weight: 600; margin: 0 0 8px; }
.subtitle { text-align: center; color: #8a7a6a; font-size: 13px; margin: 0 0 24px; }
</style>
</head>
<body>
<div class="container">
<p class="title">Three directions for your capybara</p>
<p class="subtitle">Same character, three styling levels. Direction B (warm rounded) was selected.</p>

<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.label { font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #5a4a3a; }
.sub { font-family: -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #8a7a6a; }
.divider { stroke: #e8dfd3; stroke-width: 1; }
</style>
</defs>
<rect x="0" y="0" width="680" height="560" fill="#faf6f0" rx="12"/>
<line x1="226.67" y1="80" x2="226.67" y2="480" class="divider"/>
<line x1="453.33" y1="80" x2="453.33" y2="480" class="divider"/>

<g transform="translate(113, 100)">
  <text x="0" y="0" text-anchor="middle" class="label">A. Minimal geometric</text>
  <text x="0" y="18" text-anchor="middle" class="sub">Clean shapes, very designed</text>
  <g transform="translate(0, 180)">
    <ellipse cx="0" cy="20" rx="55" ry="42" fill="#b8956b"/>
    <ellipse cx="0" cy="-30" rx="40" ry="34" fill="#c4a07a"/>
    <ellipse cx="-22" cy="-55" rx="8" ry="6" fill="#a08560"/>
    <ellipse cx="22" cy="-55" rx="8" ry="6" fill="#a08560"/>
    <ellipse cx="-22" cy="-55" rx="4" ry="3" fill="#d4a8a0"/>
    <ellipse cx="22" cy="-55" rx="4" ry="3" fill="#d4a8a0"/>
    <circle cx="-13" cy="-32" r="2.8" fill="#3a2818"/>
    <circle cx="13" cy="-32" r="2.8" fill="#3a2818"/>
    <ellipse cx="0" cy="-18" rx="8" ry="5" fill="#8a6a4a"/>
    <ellipse cx="-30" cy="58" rx="10" ry="6" fill="#a08560"/>
    <ellipse cx="30" cy="58" rx="10" ry="6" fill="#a08560"/>
    <circle cx="0" cy="-72" r="11" fill="#f5a554"/>
    <ellipse cx="-3" cy="-78" rx="4" ry="2" fill="#7ca85e"/>
  </g>
  <text x="0" y="320" text-anchor="middle" class="sub">Two flat tones. Very simple.</text>
  <text x="0" y="335" text-anchor="middle" class="sub">Reads at small sizes.</text>
  <text x="0" y="350" text-anchor="middle" class="sub" style="font-style: italic;">Ages well. Most "designed."</text>
</g>

<g transform="translate(340, 100)">
  <text x="0" y="0" text-anchor="middle" class="label" style="font-weight: 700;">B. Warm rounded ★ SELECTED</text>
  <text x="0" y="18" text-anchor="middle" class="sub">Final direction</text>
  <g transform="translate(0, 180)">
    <ellipse cx="0" cy="20" rx="58" ry="44" fill="#b88a5e"/>
    <ellipse cx="-12" cy="10" rx="35" ry="25" fill="#c89868" opacity="0.5"/>
    <ellipse cx="0" cy="38" rx="32" ry="18" fill="#d4a878" opacity="0.4"/>
    <ellipse cx="0" cy="-32" rx="44" ry="38" fill="#c49574"/>
    <ellipse cx="-10" cy="-40" rx="20" ry="15" fill="#d4a584" opacity="0.5"/>
    <ellipse cx="-26" cy="-58" rx="10" ry="8" fill="#a07854"/>
    <ellipse cx="26" cy="-58" rx="10" ry="8" fill="#a07854"/>
    <ellipse cx="-26" cy="-57" rx="5" ry="4" fill="#e5b8a8"/>
    <ellipse cx="26" cy="-57" rx="5" ry="4" fill="#e5b8a8"/>
    <ellipse cx="-14" cy="-32" rx="3.5" ry="4" fill="#2a1d14"/>
    <ellipse cx="14" cy="-32" rx="3.5" ry="4" fill="#2a1d14"/>
    <circle cx="-13" cy="-33" r="1" fill="#fff"/>
    <circle cx="15" cy="-33" r="1" fill="#fff"/>
    <ellipse cx="0" cy="-16" rx="10" ry="6" fill="#7a5840"/>
    <circle cx="-3" cy="-17" r="0.8" fill="#2a1d14"/>
    <circle cx="3" cy="-17" r="0.8" fill="#2a1d14"/>
    <path d="M -4 -10 Q 0 -7 4 -10" stroke="#5a3d28" stroke-width="1" fill="none" stroke-linecap="round"/>
    <ellipse cx="-32" cy="60" rx="12" ry="7" fill="#a07854"/>
    <ellipse cx="32" cy="60" rx="12" ry="7" fill="#a07854"/>
    <circle cx="0" cy="-78" r="13" fill="#f29545"/>
    <ellipse cx="-2" cy="-80" rx="8" ry="6" fill="#f5a458" opacity="0.6"/>
    <ellipse cx="-5" cy="-88" rx="5" ry="2.5" fill="#7ca85e" transform="rotate(-30, -5, -88)"/>
    <line x1="0" y1="-89" x2="-2" y2="-86" stroke="#5a7d3e" stroke-width="1.5"/>
  </g>
  <text x="0" y="320" text-anchor="middle" class="sub">Subtle warmth and dimension.</text>
  <text x="0" y="335" text-anchor="middle" class="sub">Friendly but adult-friendly.</text>
  <text x="0" y="350" text-anchor="middle" class="sub" style="font-style: italic;">The orange is the signature.</text>
</g>

<g transform="translate(566, 100)">
  <text x="0" y="0" text-anchor="middle" class="label">C. Chibi friendly</text>
  <text x="0" y="18" text-anchor="middle" class="sub">Cuter, more emotive</text>
  <g transform="translate(0, 180)">
    <ellipse cx="0" cy="30" rx="42" ry="32" fill="#b88a5e"/>
    <ellipse cx="0" cy="42" rx="26" ry="14" fill="#d4a878" opacity="0.5"/>
    <ellipse cx="0" cy="-30" rx="50" ry="44" fill="#c49574"/>
    <circle cx="-30" cy="-18" r="8" fill="#e5a89a" opacity="0.5"/>
    <circle cx="30" cy="-18" r="8" fill="#e5a89a" opacity="0.5"/>
    <ellipse cx="-30" cy="-60" rx="11" ry="9" fill="#a07854"/>
    <ellipse cx="30" cy="-60" rx="11" ry="9" fill="#a07854"/>
    <ellipse cx="-30" cy="-59" rx="6" ry="5" fill="#e5b8a8"/>
    <ellipse cx="30" cy="-59" rx="6" ry="5" fill="#e5b8a8"/>
    <ellipse cx="-16" cy="-30" rx="5" ry="6" fill="#2a1d14"/>
    <ellipse cx="16" cy="-30" rx="5" ry="6" fill="#2a1d14"/>
    <circle cx="-15" cy="-32" r="1.8" fill="#fff"/>
    <circle cx="17" cy="-32" r="1.8" fill="#fff"/>
    <ellipse cx="0" cy="-12" rx="9" ry="5" fill="#7a5840"/>
    <path d="M -5 -5 Q 0 0 5 -5" stroke="#5a3d28" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="-22" cy="60" rx="10" ry="6" fill="#a07854"/>
    <ellipse cx="22" cy="60" rx="10" ry="6" fill="#a07854"/>
    <circle cx="0" cy="-80" r="14" fill="#f29545"/>
    <ellipse cx="-2" cy="-82" rx="9" ry="6" fill="#f5a458" opacity="0.6"/>
    <ellipse cx="-6" cy="-92" rx="6" ry="3" fill="#7ca85e" transform="rotate(-30, -6, -92)"/>
  </g>
  <text x="0" y="320" text-anchor="middle" class="sub">Bigger head, bigger eyes.</text>
  <text x="0" y="335" text-anchor="middle" class="sub">More expressive, more "cute."</text>
  <text x="0" y="350" text-anchor="middle" class="sub" style="font-style: italic;">Could read as kid-app.</text>
</g>
</svg>
</div>
</body>
</html>
